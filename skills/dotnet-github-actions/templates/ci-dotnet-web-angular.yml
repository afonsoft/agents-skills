name: CI Build & Test

on:
  push:
    branches:
      - develop
      - feature/*
      - bug/*
      - hotfix/*
      - release/*
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'
  SOLUTION_FILE: 'TODO.sln'  # Replace with the API/backend solution file
  BACKEND_SOLUTION: 'Templates/Api/TODO.sln'  # Replace with the API template solution
  ANGULAR_WORKDIR: 'Templates/Angular/TODO.UI'  # Replace with the Angular app directory

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.BACKEND_SOLUTION }} --no-cache --force

      - name: Build
        run: |
          dotnet build ${{ env.BACKEND_SOLUTION }} \
            --no-restore \
            --configuration Release \
            --verbosity minimal

      - name: Test
        run: |
          dotnet test ${{ env.BACKEND_SOLUTION }} \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults \
            --collect:"XPlat Code Coverage" \
            --verbosity normal

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-backend
          path: |
            TestResults/**/*.trx
            TestResults/**/*.coverage
          retention-days: 7

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.ANGULAR_WORKDIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Node Modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund --legacy-peer-deps --ignore-scripts

      - name: Patch Devtools (EAF-specific)
        run: |
          if [ -f "scripts/patch-devtools-ignore-plugin.js" ]; then
            node scripts/patch-devtools-ignore-plugin.js
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: |
          npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload Frontend Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-frontend
          path: |
            coverage/
            test-results/
          retention-days: 7
