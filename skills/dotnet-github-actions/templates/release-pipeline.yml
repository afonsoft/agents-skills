name: Release Pipeline

on:
  push:
    branches:
      - main
      - release/*
  release:
    types: [published]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'
  BUILD_CONFIG: 'Release'
  API_SOLUTION: 'Templates/Api/TODO.sln'  # Replace with the API solution
  API_PROJECT: 'Templates/Api/src/TODO.Web.Host/TODO.Web.Host.csproj'  # Replace with the host project
  ANGULAR_WORKDIR: 'Templates/Angular/TODO.UI'  # Replace with the Angular app directory
  PUBLISH_DIR: 'publish'

jobs:
  build-production:
    name: Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Backend
        run: dotnet restore ${{ env.API_SOLUTION }}

      - name: Restore Frontend
        working-directory: ${{ env.ANGULAR_WORKDIR }}
        run: |
          npm ci --no-audit --no-fund --legacy-peer-deps --ignore-scripts
          if [ -f "scripts/patch-devtools-ignore-plugin.js" ]; then
            node scripts/patch-devtools-ignore-plugin.js
          fi

      - name: Build Backend
        run: |
          dotnet build ${{ env.API_SOLUTION }} \
            --configuration ${{ env.BUILD_CONFIG }} \
            --no-restore \
            --verbosity minimal

      - name: Build Frontend
        working-directory: ${{ env.ANGULAR_WORKDIR }}
        run: npm run build

      - name: Create Artifacts
        run: |
          mkdir -p artifacts/backend artifacts/frontend

          dotnet publish ${{ env.API_PROJECT }} \
            --configuration ${{ env.BUILD_CONFIG }} \
            --output artifacts/backend \
            --no-restore \
            --framework net10.0 \
            --verbosity minimal

          cp -r ${{ env.ANGULAR_WORKDIR }}/dist/* artifacts/frontend/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: production-build-${{ github.sha }}
          path: artifacts/
          retention-days: 30

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-production
    environment: staging
    if: false  # Enable and replace the placeholder deploy steps when staging is ready.

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: production-build-${{ github.sha }}
          path: artifacts/

      - name: Deploy API to Staging
        run: |
          echo "Deploy API to staging..."
          # Add staging deploy here (e.g., FTP, Azure, Docker).

      - name: Deploy UI to Staging
        run: |
          echo "Deploy UI to staging..."
          # Add staging deploy here.

      - name: Staging Health Check
        run: |
          echo "Run staging health checks..."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-production, deploy-staging]
    environment: production
    if: github.event_name == 'release'

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: production-build-${{ github.sha }}
          path: artifacts/

      - name: Deploy API to Production
        run: |
          echo "Deploy API to production..."
          # Add production deploy here (e.g., FTP, Azure, Docker).

      - name: Deploy UI to Production
        run: |
          echo "Deploy UI to production..."
          # Add production deploy here.

      - name: Production Health Check
        run: |
          echo "Run production health checks..."

      - name: Notify
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: 'Production deployment successful! Version: ${{ github.ref_name }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
