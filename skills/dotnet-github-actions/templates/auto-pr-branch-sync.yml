name: Auto PR from Main to Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BASE_BRANCH: 'main'  # Source branch for sync

jobs:
  create-prs:
    name: Sync Main to Active Branches
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get Target Branches
        id: branches
        run: |
          ALL_BRANCHES=$(git ls-remote --heads origin | sed 's/.*refs\/heads\///' | grep -v '^main$' | tr '\n' ' ')
          MERGED_BRANCHES=$(git branch -r --merged origin/main | sed 's/origin\///' | xargs)

          BRANCHES=""
          for branch in $ALL_BRANCHES; do
            case "$branch" in
              develop|staging|testing|feature/*|bug/*|hotfix/*|release/*|devin/*)
                IS_MERGED=false
                for merged in $MERGED_BRANCHES; do
                  if [ "$branch" = "$merged" ]; then
                    IS_MERGED=true
                    break
                  fi
                done

                if [ "$IS_MERGED" = false ]; then
                  BRANCHES="$BRANCHES $branch"
                  echo "Branch '$branch' will be updated"
                fi
                ;;
            esac
          done

          BRANCHES=$(echo "$BRANCHES" | xargs)
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "Target branches: $BRANCHES"

      - name: Create PR for Each Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAIN_SHA: ${{ github.sha }}
          MAIN_MESSAGE: ${{ github.event.head_commit.message }}
          MAIN_AUTHOR: ${{ github.event.head_commit.author.name || github.actor }}
        run: |
          IFS=' ' read -ra BRANCH_ARRAY <<< "${{ steps.branches.outputs.branches }}"

          for branch in "${BRANCH_ARRAY[@]}"; do
            echo "Processing branch: $branch"

            if ! git ls-remote --exit-code --heads origin "$branch"; then
              echo "Branch $branch does not exist, skipping"
              continue
            fi

            TEMP_BRANCH="auto-update-$branch-$(date +%s)"
            git checkout -b "$TEMP_BRANCH" origin/main
            git push origin "$TEMP_BRANCH"

            PR_TITLE="Auto-update from main to $branch"
            PR_BODY="Automatic update from main.

            **Commit:** [$MAIN_SHA](${{ github.server_url }}/${{ github.repository }}/commit/$MAIN_SHA)
            **Message:** $MAIN_MESSAGE
            **Author:** $MAIN_AUTHOR"

            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base "$branch" \
              --head "$TEMP_BRANCH" \
              --assignee afonsoft || echo "PR already exists or creation failed"

            git push origin --delete "$TEMP_BRANCH" || true
            echo "PR created/updated for $branch"
          done

      - name: Summary
        if: always()
        run: |
          echo "## Auto-PR Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target branches:** ${{ steps.branches.outputs.branches }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** completed" >> $GITHUB_STEP_SUMMARY
